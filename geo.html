<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Géographie — Orore</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="brand">
        <a href="index.html" style="text-decoration:none;">
          <div class="brand-mark">Orore</div>
        </a>
        <div class="brand-tagline">l'apprentissage qui s'éveille</div>
      </div>
      <nav class="nav-links">
        <a href="index.html">← Retour aux matières</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">

      <section class="geo-intro">
        <h1>Géographie</h1>
        <p>Clique sur un pays pour partir en exposé.</p>
      </section>

      <!--
        CARTE DU MONDE SIMPLIFIÉE EN SVG
        Inspirée de la projection Mercator simplifiée.
        Seule la CHINE est cliquable (class "available").
        Les autres pays sont des paths regroupés en silhouette continentale.
      -->
      <div class="world-map-wrapper">
        <div id="country-tooltip" class="country-tooltip">La Chine</div>

        <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" id="world-map">

          <!-- Fond océan -->
          <rect width="1000" height="500" fill="#dde6ed" opacity="0.4"/>

          <!-- AMÉRIQUE DU NORD (stylisée) -->
          <path class="country" d="
            M 100,80 L 180,75 L 260,90 L 280,140 L 250,200 L 200,230 L 150,220
            L 110,180 L 90,130 Z" />

          <!-- AMÉRIQUE CENTRALE -->
          <path class="country" d="
            M 180,230 L 240,240 L 230,275 L 200,280 L 180,260 Z" />

          <!-- AMÉRIQUE DU SUD -->
          <path class="country" d="
            M 220,280 L 280,275 L 305,310 L 295,380 L 270,440 L 240,430
            L 220,380 L 215,330 Z" />

          <!-- GROENLAND -->
          <path class="country" d="M 320,50 L 360,55 L 365,90 L 335,105 L 315,80 Z" />

          <!-- EUROPE -->
          <path class="country" d="
            M 460,100 L 530,95 L 550,120 L 545,160 L 510,180 L 470,170
            L 450,140 Z" />

          <!-- AFRIQUE -->
          <path class="country" d="
            M 470,200 L 560,195 L 600,240 L 595,310 L 560,380 L 520,400
            L 480,360 L 460,290 L 455,240 Z" />

          <!-- MOYEN-ORIENT -->
          <path class="country" d="M 580,180 L 640,175 L 650,215 L 615,230 L 580,215 Z" />

          <!-- ASIE CENTRALE (Russie partie ouest) -->
          <path class="country" d="
            M 540,80 L 700,70 L 780,90 L 770,140 L 700,150 L 620,145
            L 555,130 Z" />

          <!-- INDE -->
          <path class="country" d="
            M 660,220 L 720,215 L 730,245 L 715,290 L 685,290 L 670,260 Z" />

          <!-- ASIE DU SUD-EST -->
          <path class="country" d="
            M 750,260 L 800,265 L 815,300 L 795,330 L 760,325 L 745,290 Z" />

          <!-- ===== CHINE (LE SEUL PAYS CLIQUABLE) ===== -->
          <path class="country available" id="china-path" d="
            M 700,150 L 800,145 L 870,170 L 880,220 L 850,255 L 800,265
            L 750,260 L 720,240 L 700,205 Z"
            data-country="china"
            data-name="La Chine" />

          <!-- JAPON -->
          <path class="country" d="M 890,180 L 920,175 L 925,215 L 905,225 L 890,200 Z" />

          <!-- INDONÉSIE -->
          <path class="country" d="M 760,340 L 850,335 L 855,360 L 770,365 Z" />

          <!-- AUSTRALIE -->
          <path class="country" d="
            M 820,380 L 920,375 L 935,410 L 910,440 L 850,445
            L 820,420 Z" />

          <!-- NOUVELLE-ZÉLANDE -->
          <path class="country" d="M 945,450 L 970,448 L 975,470 L 950,472 Z" />

          <!-- ANTARCTIQUE (suggéré, en bas) -->
          <path class="country" d="M 50,490 L 950,490 L 950,500 L 50,500 Z" opacity="0.5" />

          <!-- Indicateur Chine : drapeau + label discret -->
          <g id="china-indicator" style="pointer-events: none;">
            <circle cx="790" cy="200" r="3" fill="#c8842a"/>
            <text x="790" y="195" text-anchor="middle"
                  font-family="DM Sans" font-size="14" font-weight="600"
                  fill="#1a1f2e">🇨🇳 Chine</text>
          </g>

        </svg>

        <div style="margin-top: 1.5rem; text-align: center; font-family: var(--font-display); font-style: italic; color: var(--ink-soft);">
          ✦ Seule la Chine est ouverte pour cet exposé ✦
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Orore — Géographie</p>
    </div>
  </footer>

  <!-- Interactivité carte -->
  <script>
    (function() {
      const chinaPath = document.getElementById('china-path');
      const tooltip   = document.getElementById('country-tooltip');
      const wrapper   = document.querySelector('.world-map-wrapper');

      if (!chinaPath) return;

      chinaPath.addEventListener('mouseenter', (e) => {
        tooltip.classList.add('show');
      });
      chinaPath.addEventListener('mousemove', (e) => {
        const rect = wrapper.getBoundingClientRect();
        tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
        tooltip.style.top  = (e.clientY - rect.top - 10) + 'px';
      });
      chinaPath.addEventListener('mouseleave', () => {
        tooltip.classList.remove('show');
      });
      chinaPath.addEventListener('click', () => {
        // Petite anim avant redirection
        chinaPath.style.transition = 'all 0.4s';
        chinaPath.style.fill = '#9a5f1a';
        setTimeout(() => {
          window.location.href = 'lesson.html?id=china';
        }, 300);
      });
    })();
  </script>

</body>
</html>
