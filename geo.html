<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Géographie — Orore</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="brand">
        <a href="index.html" style="text-decoration:none;">
          <div class="brand-mark">Orore</div>
        </a>
        <div class="brand-tagline">l'apprentissage qui s'éveille</div>
      </div>
      <nav class="nav-links">
        <a href="index.html">← Retour aux matières</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">

      <section class="geo-intro">
        <h1>Géographie</h1>
        <p>Clique sur un pays pour partir en exposé.</p>
      </section>

      <div class="world-map-wrapper">
        <div id="country-tooltip" class="country-tooltip">La Chine</div>

        <div id="world-map-container" style="min-height: 400px; display:flex; align-items:center; justify-content:center;">
          <div style="font-family: var(--font-display); font-style: italic; color: var(--ink-soft);">
            Chargement de la carte du monde…
          </div>
        </div>

        <div style="margin-top: 1.5rem; text-align: center; font-family: var(--font-display); font-style: italic; color: var(--ink-soft);">
          ✦ Seule la Chine est ouverte pour cet exposé ✦
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Orore — Géographie</p>
    </div>
  </footer>

  <script>
    (async function() {
      const container = document.getElementById('world-map-container');
      const tooltip   = document.getElementById('country-tooltip');
      const wrapper   = document.querySelector('.world-map-wrapper');

      try {
        const res = await fetch('assets/world-map.svg');
        if (!res.ok) throw new Error('Carte introuvable');
        const svgText = await res.text();
        container.innerHTML = svgText;

        const svg = container.querySelector('svg');
        if (svg) {
          svg.style.width = '100%';
          svg.style.height = 'auto';
          svg.style.maxHeight = '70vh';
        }

        const chinaPath = document.getElementById('china-path');
        if (chinaPath) {
          chinaPath.addEventListener('mouseenter', () => tooltip.classList.add('show'));
          chinaPath.addEventListener('mousemove', (e) => {
            const rect = wrapper.getBoundingClientRect();
            tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
            tooltip.style.top  = (e.clientY - rect.top - 10) + 'px';
          });
          chinaPath.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
          chinaPath.addEventListener('click', () => {
            chinaPath.style.transition = 'all 0.4s';
            chinaPath.style.fill = '#9a5f1a';
            setTimeout(() => {
              window.location.href = 'lesson.html?id=china';
            }, 300);
          });
        }
      } catch (err) {
        console.error('[Orore] Erreur carte monde:', err);
        container.innerHTML = '<div style="text-align:center; padding: 3rem; color: var(--terracotta);"><p style="font-family: var(--font-display); font-style: italic; font-size: 1.2rem;">Carte momentanément indisponible.<br>Vérifiez votre connexion ou réessayez.</p></div>';
      }
    })();
  </script>

  <!-- Twemoji -->
  <script src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <script>
    if (typeof twemoji !== 'undefined') {
      twemoji.parse(document.body, {
        folder: 'svg', ext: '.svg',
        base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
      });
    }
  </script>

</body>
</html>
